name: rent_split
description: Fair rent splitting calculator for roommates.
version: 1.1.0+6
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  share_plus: ^10.1.2
  pdf: ^3.10.8
  printing: ^5.12.0
  in_app_purchase: ^3.1.13
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  rive: ^0.13.14
  google_fonts: ^6.1.0
  uuid: ^4.3.3
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/splash_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1D9E75"
  adaptive_icon_foreground: "assets/images/splash_logo.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
