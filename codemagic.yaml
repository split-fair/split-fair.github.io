workflows:
  ios-testflight:
    name: Split Fair — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain and code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.splitfair.rentSplit \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build iOS release
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers

  android-release:
    name: Split Fair — Android Play Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - android-signing
      vars:
        PACKAGE_NAME: "com.splitfair.rent_split"
        KEY_ALIAS: "split-fair"
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Set up Android keystore
        script: |
          echo $CM_KEYSTORE_B64 | base64 --decode > $CM_BUILD_DIR/split-fair-release.jks
          export KEYSTORE_PATH=$CM_BUILD_DIR/split-fair-release.jks
          export KEYSTORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          export KEY_PASSWORD=$CM_KEY_PASSWORD
      - name: Build Android AAB
        script: |
          export KEYSTORE_PATH=$CM_BUILD_DIR/split-fair-release.jks
          export KEYSTORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          export KEY_ALIAS=split-fair
          export KEY_PASSWORD=$CM_KEY_PASSWORD
          flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
    # publishing:       # DISABLED — awaiting Google Play identity verification + service account JSON
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: true
