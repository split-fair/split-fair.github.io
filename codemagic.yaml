workflows:
  ios-testflight:
    name: Split Fair — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.splitfair.rentSplit
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build iOS release
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers

  android-release:
    name: Split Fair — Android Play Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      android_signing:
        - split_fair_keystore
      vars:
        PACKAGE_NAME: "com.splitfair.rent_split"
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build Android AAB
        script: |
          flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
