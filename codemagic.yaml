workflows:
  ios-testflight:
    name: Split Fair — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - ios-signing
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Auto-increment build number
        script: |
          # Use Codemagic build number to ensure unique builds every time
          BUILD_NUM=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_ID" || echo 0) + 1))
          # Fallback: use PROJECT_BUILD_NUMBER from Codemagic if ASC fails
          BUILD_NUM=${BUILD_NUM:-$PROJECT_BUILD_NUMBER}
          cd $CM_BUILD_DIR
          CURRENT_VER=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          sed -i "s/version: .*/version: ${CURRENT_VER}+${BUILD_NUM}/" pubspec.yaml
          echo "Building version: ${CURRENT_VER}+${BUILD_NUM}"
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files \
            com.splitfair.rentSplit \
            --type IOS_APP_STORE \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create
      - name: Get Flutter packages and run project migrations
        script: |
          flutter packages pub get
          flutter build ios --release --no-codesign || true
      - name: Apply code signing after migrations
        script: |
          keychain add-certificates
          xcode-project use-profiles
      - name: Archive and export IPA
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/ios/Runner.xcarchive \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/ios/Runner.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath $CM_BUILD_DIR/ios/ipa
    artifacts:
      - $CM_BUILD_DIR/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers

  android-release:
    name: Split Fair — Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    environment:
      flutter: stable
      groups:
        - android-signing
        - google-play
      vars:
        PACKAGE_NAME: "com.splitfair.rent_split"
        KEY_ALIAS: "split-fair"
    scripts:
      - name: Auto-increment build number
        script: |
          # Use Codemagic project build number for unique Android version codes
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-15}
          cd $CM_BUILD_DIR
          CURRENT_VER=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          sed -i "s/version: .*/version: ${CURRENT_VER}+${BUILD_NUM}/" pubspec.yaml
          echo "Building version: ${CURRENT_VER}+${BUILD_NUM}"
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Set up Android keystore
        script: |
          echo $CM_KEYSTORE_B64 | base64 --decode > $CM_BUILD_DIR/split-fair-release.jks
          export KEYSTORE_PATH=$CM_BUILD_DIR/split-fair-release.jks
          export KEYSTORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          export KEY_PASSWORD=$CM_KEY_PASSWORD
      - name: Build Android APK and AAB
        script: |
          export KEYSTORE_PATH=$CM_BUILD_DIR/split-fair-release.jks
          export KEYSTORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          export KEY_ALIAS=split-fair
          export KEY_PASSWORD=$CM_KEY_PASSWORD
          flutter build apk --release
          flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - clairmont425@gmail.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
